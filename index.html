<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2026 March Madness Survivor Pool Tracker</title>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2736;
            --card-hover: #223344;
            --accent: #ff6b35;
            --accent2: #ffd166;
            --green: #06d6a0;
            --red: #ef476f;
            --blue: #118ab2;
            --text: #e8e8e8;
            --text-dim: #8899aa;
            --border: #2a3a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a2736 0%, #0f1923 100%);
            border-bottom: 3px solid var(--accent);
            padding: 1.5rem 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .header p { color: var(--text-dim); margin-top: 0.3rem; font-size: 0.95rem; }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 2rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-alive .stat-value { color: var(--green); }
        .stat-picks .stat-value { color: var(--accent); }
        .stat-used .stat-value { color: var(--accent2); }
        .stat-remaining .stat-value { color: var(--blue); }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab:hover { background: var(--card-hover); color: var(--text); }
        .tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem 3rem;
        }

        /* Picks Tracker */
        .day-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .day-header h3 { font-size: 1rem; font-weight: 700; }
        .day-header .day-date { color: var(--text-dim); font-size: 0.85rem; }
        .day-header .day-status {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
        }
        .day-status.pending { background: rgba(255,209,102,0.15); color: var(--accent2); }
        .day-status.complete { background: rgba(6,214,160,0.15); color: var(--green); }
        .day-status.lost { background: rgba(239,71,111,0.15); color: var(--red); }
        .day-body { padding: 1rem 1.25rem; }
        .day-body.collapsed { display: none; }

        .pick-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        .pick-num {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 700;
            min-width: 50px;
        }
        .pick-select {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .pick-select:focus { outline: none; border-color: var(--accent); }
        .pick-select option { background: var(--bg); }

        .result-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-btn.win { background: rgba(6,214,160,0.2); color: var(--green); border: 1px solid rgba(6,214,160,0.3); }
        .result-btn.win.active { background: var(--green); color: #000; }
        .result-btn.loss { background: rgba(239,71,111,0.2); color: var(--red); border: 1px solid rgba(239,71,111,0.3); }
        .result-btn.loss.active { background: var(--red); color: #fff; }
        .result-btn.tbd { background: rgba(136,153,170,0.2); color: var(--text-dim); border: 1px solid var(--border); }
        .result-btn.tbd.active { background: var(--text-dim); color: var(--bg); }

        /* Bracket / Teams */
        .region-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .region-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .region-header h3 { font-weight: 700; }
        .region-seed-tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
        }
        .region-body { padding: 0.75rem 1.25rem; }
        .region-body.collapsed { display: none; }

        .matchup {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
        }
        .matchup:last-child { border-bottom: none; }
        .seed {
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-right: 0.5rem;
        }
        .seed-1, .seed-2, .seed-3 { background: rgba(255,107,53,0.2); color: var(--accent); }
        .seed-4, .seed-5, .seed-6 { background: rgba(17,138,178,0.2); color: var(--blue); }
        .seed-7, .seed-8, .seed-9 { background: rgba(255,209,102,0.2); color: var(--accent2); }
        .seed-10, .seed-11, .seed-12 { background: rgba(136,153,170,0.15); color: var(--text-dim); }
        .seed-13, .seed-14, .seed-15, .seed-16 { background: rgba(136,153,170,0.08); color: var(--text-dim); }
        .team-name { flex: 1; }
        .team-used {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            background: rgba(239,71,111,0.15);
            color: var(--red);
            font-weight: 600;
        }
        .team-eliminated {
            text-decoration: line-through;
            opacity: 0.4;
        }
        .vs-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin: 0 0.5rem;
        }
        .spread-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(255,209,102,0.15);
            color: var(--accent2);
            white-space: nowrap;
            margin-left: 0.5rem;
        }
        .spread-close {
            background: rgba(239,71,111,0.15);
            color: var(--red);
        }

        /* Sorted Lines */
        .lines-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.4rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
        }
        .lines-row:last-child { border-bottom: none; }
        .lines-rank {
            min-width: 28px;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 700;
        }
        .lines-teams {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .lines-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-left: auto;
            flex-shrink: 0;
        }
        .lines-region {
            color: var(--text-dim);
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* Rules */
        .rules-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .rules-card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .rules-card ul {
            list-style: none;
            padding: 0;
        }
        .rules-card li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .rules-card li::before {
            content: "▸ ";
            color: var(--accent);
            font-weight: 700;
        }
        .rules-card li:last-child { border-bottom: none; }
        .rule-bold { color: var(--accent2); font-weight: 600; }

        /* Games view */
        .games-section { margin-bottom: 1.5rem; }
        .games-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .game-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .game-teams { flex: 1; }
        .game-result {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: 700;
        }

        .btn-reset {
            background: rgba(239,71,111,0.15);
            color: var(--red);
            border: 1px solid rgba(239,71,111,0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 1rem;
        }
        .btn-reset:hover { background: var(--red); color: #fff; }

        .toggle-arrow {
            transition: transform 0.2s;
            color: var(--text-dim);
        }
        .toggle-arrow.collapsed { transform: rotate(-90deg); }

        .eliminated-banner {
            background: rgba(239,71,111,0.15);
            border: 1px solid rgba(239,71,111,0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            color: var(--red);
            font-weight: 700;
            margin-bottom: 1rem;
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .status-bar { gap: 1rem; padding: 0.75rem 1rem; }
            .stat-value { font-size: 1.3rem; }
            .container { padding: 0.75rem; }
            .pick-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MARCH MADNESS SURVIVOR 2026</h1>
        <p>Bryan's Pool &bull; $50 Buy-In &bull; No Rebuys</p>
    </div>

    <div class="status-bar">
        <div class="stat stat-alive">
            <div class="stat-value" id="statusText">ALIVE</div>
            <div class="stat-label">Status</div>
        </div>
        <div class="stat stat-picks">
            <div class="stat-value" id="totalPicks">0</div>
            <div class="stat-label">Picks Made</div>
        </div>
        <div class="stat stat-used">
            <div class="stat-value" id="teamsUsed">0</div>
            <div class="stat-label">Teams Used</div>
        </div>
        <div class="stat stat-remaining">
            <div class="stat-value" id="winsCount">0</div>
            <div class="stat-label">Wins</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="picks">My Picks</div>
        <div class="tab" data-tab="bracket">Bracket</div>
        <div class="tab" data-tab="lines">Sorted Lines</div>
        <div class="tab" data-tab="rules">Rules</div>
    </div>

    <div class="container">
        <div id="eliminated-banner" class="eliminated-banner">
            YOU HAVE BEEN ELIMINATED
        </div>

        <div id="tab-picks"></div>
        <div id="tab-bracket" style="display:none"></div>
        <div id="tab-lines" style="display:none"></div>
        <div id="tab-rules" style="display:none"></div>
    </div>

    <script>
    const BRACKET = {
        "East": [
            { seed: 1, team: "Duke", record: "32-2", vs_seed: 16, vs_team: "Siena", spread: -27.5 },
            { seed: 8, team: "Ohio State", vs_seed: 9, vs_team: "TCU", spread: -2.5 },
            { seed: 5, team: "St. John's", vs_seed: 12, vs_team: "Northern Iowa", spread: -10.5 },
            { seed: 4, team: "Kansas", vs_seed: 13, vs_team: "Cal Baptist", spread: -14.5 },
            { seed: 6, team: "Louisville", vs_seed: 11, vs_team: "South Florida", spread: -7.5 },
            { seed: 3, team: "Michigan State", vs_seed: 14, vs_team: "North Dakota St", spread: -16.5 },
            { seed: 7, team: "UCLA", vs_seed: 10, vs_team: "UCF", spread: -3.5 },
            { seed: 2, team: "UConn", record: "29-5", vs_seed: 15, vs_team: "Furman", spread: -19.5 }
        ],
        "West": [
            { seed: 1, team: "Arizona", record: "32-2", vs_seed: 16, vs_team: "LIU", spread: -29.5 },
            { seed: 8, team: "Villanova", vs_seed: 9, vs_team: "Utah State", spread: 1.5 },
            { seed: 5, team: "Wisconsin", vs_seed: 12, vs_team: "High Point", spread: -12.5 },
            { seed: 4, team: "Arkansas", vs_seed: 13, vs_team: "Hawaii", spread: -15.5 },
            { seed: 6, team: "BYU", vs_seed: 11, vs_team: "Texas/NC State", spread: -5.5 },
            { seed: 3, team: "Gonzaga", vs_seed: 14, vs_team: "Kennesaw State", spread: -18.5 },
            { seed: 7, team: "Miami FL", vs_seed: 10, vs_team: "Missouri", spread: -1.5 },
            { seed: 2, team: "Purdue", vs_seed: 15, vs_team: "Queens", spread: -23.5 }
        ],
        "Midwest": [
            { seed: 1, team: "Michigan", record: "31-3", vs_seed: 16, vs_team: "UMBC/Howard", spread: -28.5 },
            { seed: 8, team: "Georgia", vs_seed: 9, vs_team: "Saint Louis", spread: -2.5 },
            { seed: 5, team: "Texas Tech", vs_seed: 12, vs_team: "Akron", spread: -8.5 },
            { seed: 4, team: "Alabama", vs_seed: 13, vs_team: "Hofstra", spread: -12.5 },
            { seed: 6, team: "Tennessee", vs_seed: 11, vs_team: "Miami OH/SMU", spread: -9.5 },
            { seed: 3, team: "Virginia", record: "29-5", vs_seed: 14, vs_team: "Wright State", spread: -17.5 },
            { seed: 7, team: "Kentucky", vs_seed: 10, vs_team: "Santa Clara", spread: -3.5 },
            { seed: 2, team: "Iowa State", vs_seed: 15, vs_team: "Tennessee State", spread: -24.5 }
        ],
        "South": [
            { seed: 1, team: "Florida", record: "26-7", vs_seed: 16, vs_team: "Pra. View/Lehigh", spread: -27.5 },
            { seed: 8, team: "Clemson", vs_seed: 9, vs_team: "Iowa", spread: -1.5 },
            { seed: 5, team: "Vanderbilt", vs_seed: 12, vs_team: "McNeese", spread: -11.5 },
            { seed: 4, team: "Nebraska", vs_seed: 13, vs_team: "Troy", spread: -13.5 },
            { seed: 6, team: "North Carolina", vs_seed: 11, vs_team: "VCU", spread: -3 },
            { seed: 3, team: "Illinois", record: "24-8", vs_seed: 14, vs_team: "Penn", spread: -17.5 },
            { seed: 7, team: "Saint Mary's", vs_seed: 10, vs_team: "Texas A&M", spread: -2.5 },
            { seed: 2, team: "Houston", record: "28-6", vs_seed: 15, vs_team: "Idaho", spread: -24.5 }
        ]
    };

    const DAYS = [
        { id: "day1", label: "Day 1 — Round of 64", date: "Thursday, March 19", picksNeeded: 2, round: "R64" },
        { id: "day2", label: "Day 2 — Round of 64", date: "Friday, March 20", picksNeeded: 2, round: "R64" },
        { id: "day3", label: "Day 3 — Round of 32", date: "Saturday, March 21", picksNeeded: 1, round: "R32" },
        { id: "day4", label: "Day 4 — Round of 32", date: "Sunday, March 22", picksNeeded: 1, round: "R32" },
        { id: "day5", label: "Day 5 — Sweet 16", date: "Thursday, March 27", picksNeeded: 1, round: "S16" },
        { id: "day6", label: "Day 6 — Sweet 16", date: "Friday, March 28", picksNeeded: 1, round: "S16" },
        { id: "day7", label: "Day 7 — Elite 8", date: "Saturday, March 29", picksNeeded: 1, round: "E8" },
        { id: "day8", label: "Day 8 — Elite 8", date: "Sunday, March 30", picksNeeded: 1, round: "E8" },
        { id: "day9", label: "Day 9 — Final Four", date: "Saturday, April 4", picksNeeded: 1, round: "F4" },
        { id: "day10", label: "Day 10 — Championship", date: "Monday, April 6", picksNeeded: 1, round: "NC" }
    ];

    // Build flat team list
    function getAllTeams() {
        const teams = [];
        for (const [region, matchups] of Object.entries(BRACKET)) {
            for (const m of matchups) {
                teams.push({ seed: m.seed, team: m.team, region });
                teams.push({ seed: m.vs_seed, team: m.vs_team, region });
            }
        }
        // Handle play-in teams (split "/" entries)
        const expanded = [];
        for (const t of teams) {
            if (t.team.includes("/")) {
                for (const name of t.team.split("/")) {
                    expanded.push({ seed: t.seed, team: name.trim(), region: t.region });
                }
            } else {
                expanded.push(t);
            }
        }
        return expanded.sort((a, b) => a.seed - b.seed || a.team.localeCompare(b.team));
    }

    const ALL_TEAMS = getAllTeams();

    // State
    let state = loadState();

    function defaultState() {
        const picks = {};
        for (const day of DAYS) {
            picks[day.id] = [];
            for (let i = 0; i < day.picksNeeded; i++) {
                picks[day.id].push({ team: "", result: "" }); // result: "win", "loss", "tbd", ""
            }
        }
        return { picks, eliminatedTeams: [] };
    }

    function loadState() {
        try {
            const saved = localStorage.getItem("survivor2026");
            if (saved) return JSON.parse(saved);
        } catch(e) {}
        return defaultState();
    }

    function saveState() {
        localStorage.setItem("survivor2026", JSON.stringify(state));
    }

    function getUsedTeams() {
        const used = new Set();
        for (const day of DAYS) {
            for (const p of state.picks[day.id]) {
                if (p.team) used.add(p.team);
            }
        }
        return used;
    }

    function getStats() {
        let totalPicks = 0, wins = 0, losses = 0;
        for (const day of DAYS) {
            for (const p of state.picks[day.id]) {
                if (p.team) totalPicks++;
                if (p.result === "win") wins++;
                if (p.result === "loss") losses++;
            }
        }
        const used = getUsedTeams();
        const alive = losses === 0;
        return { totalPicks, wins, losses, teamsUsed: used.size, alive };
    }

    function updateStats() {
        const s = getStats();
        document.getElementById("totalPicks").textContent = s.totalPicks;
        document.getElementById("teamsUsed").textContent = s.teamsUsed;
        document.getElementById("winsCount").textContent = s.wins;
        const statusEl = document.getElementById("statusText");
        const banner = document.getElementById("eliminated-banner");
        if (s.losses > 0) {
            statusEl.textContent = "OUT";
            statusEl.style.color = "var(--red)";
            banner.style.display = "block";
        } else {
            statusEl.textContent = "ALIVE";
            statusEl.style.color = "var(--green)";
            banner.style.display = "none";
        }
    }

    // Render Picks Tab
    function renderPicks() {
        const container = document.getElementById("tab-picks");
        const usedTeams = getUsedTeams();
        let html = "";

        for (const day of DAYS) {
            const dayPicks = state.picks[day.id];
            const hasAllPicks = dayPicks.every(p => p.team);
            const hasResult = dayPicks.some(p => p.result);
            const hasLoss = dayPicks.some(p => p.result === "loss");
            const allWins = hasAllPicks && dayPicks.every(p => p.result === "win");

            let statusClass = "pending";
            let statusText = "Pending";
            if (hasLoss) { statusClass = "lost"; statusText = "Loss"; }
            else if (allWins) { statusClass = "complete"; statusText = "Survived"; }
            else if (hasAllPicks && hasResult) { statusClass = "complete"; statusText = "In Progress"; }
            else if (hasAllPicks) { statusClass = "pending"; statusText = "Picked"; }

            html += `<div class="day-card">
                <div class="day-header" onclick="toggleDay('${day.id}')">
                    <div>
                        <h3>${day.label}</h3>
                        <span class="day-date">${day.date} &bull; ${day.picksNeeded} pick${day.picksNeeded > 1 ? 's' : ''} required</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:0.75rem">
                        <span class="day-status ${statusClass}">${statusText}</span>
                        <span class="toggle-arrow" id="arrow-${day.id}">&#9660;</span>
                    </div>
                </div>
                <div class="day-body" id="body-${day.id}">`;

            for (let i = 0; i < day.picksNeeded; i++) {
                const pick = dayPicks[i];
                // Build options: available teams (not used in other days)
                const otherUsed = new Set();
                for (const d of DAYS) {
                    for (let j = 0; j < state.picks[d.id].length; j++) {
                        if (d.id === day.id && j === i) continue;
                        if (state.picks[d.id][j].team) otherUsed.add(state.picks[d.id][j].team);
                    }
                }

                html += `<div class="pick-row">
                    <span class="pick-num">Pick ${i + 1}</span>
                    <select class="pick-select" onchange="setPick('${day.id}', ${i}, this.value)">
                        <option value="">-- Select Team --</option>`;

                for (const [region, matchups] of Object.entries(BRACKET)) {
                    html += `<optgroup label="${region} Region">`;
                    for (const m of matchups) {
                        // Top seed team
                        const disabled1 = otherUsed.has(m.team) ? "disabled" : "";
                        const sel1 = pick.team === m.team ? "selected" : "";
                        const tag1 = otherUsed.has(m.team) ? " (used)" : "";
                        html += `<option value="${m.team}" ${disabled1} ${sel1}>(${m.seed}) ${m.team}${tag1}</option>`;
                        // Opponent
                        const vsTeams = m.vs_team.includes("/") ? m.vs_team.split("/").map(t => t.trim()) : [m.vs_team];
                        for (const vt of vsTeams) {
                            const disabled2 = otherUsed.has(vt) ? "disabled" : "";
                            const sel2 = pick.team === vt ? "selected" : "";
                            const tag2 = otherUsed.has(vt) ? " (used)" : "";
                            html += `<option value="${vt}" ${disabled2} ${sel2}>(${m.vs_seed}) ${vt}${tag2}</option>`;
                        }
                    }
                    html += `</optgroup>`;
                }

                html += `</select>
                    <div style="display:flex;gap:0.3rem">
                        <button class="result-btn win ${pick.result === 'win' ? 'active' : ''}" onclick="setResult('${day.id}', ${i}, 'win')">W</button>
                        <button class="result-btn loss ${pick.result === 'loss' ? 'active' : ''}" onclick="setResult('${day.id}', ${i}, 'loss')">L</button>
                        <button class="result-btn tbd ${pick.result === '' ? 'active' : ''}" onclick="setResult('${day.id}', ${i}, '')" title="Clear result">?</button>
                    </div>
                </div>`;
            }

            html += `</div></div>`;
        }

        html += `<div style="text-align:center">
            <button class="btn-reset" onclick="resetAll()">Reset All Picks</button>
        </div>`;

        container.innerHTML = html;
    }

    // Render Bracket Tab
    function renderBracket() {
        const container = document.getElementById("tab-bracket");
        const usedTeams = getUsedTeams();
        let html = "";

        for (const [region, matchups] of Object.entries(BRACKET)) {
            const topSeed = matchups[0];
            html += `<div class="region-card">
                <div class="region-header" onclick="toggleRegion('${region}')">
                    <h3>${region} Region</h3>
                    <div style="display:flex;align-items:center;gap:0.5rem">
                        <span style="color:var(--accent);font-size:0.85rem">#1 ${topSeed.team}</span>
                        <span class="toggle-arrow" id="arrow-region-${region}">&#9660;</span>
                    </div>
                </div>
                <div class="region-body" id="body-region-${region}">`;

            for (const m of matchups) {
                const used1 = usedTeams.has(m.team);
                const used2 = usedTeams.has(m.vs_team);
                const spread = m.spread;
                const spreadStr = spread < 0 ? spread.toString() : "+" + spread;
                const isClose = Math.abs(spread) <= 5;
                const spreadClass = isClose ? "spread-badge spread-close" : "spread-badge";
                // Favorite is the higher-seeded team (lower seed number) unless spread is positive (underdog)
                const favText = spread <= 0 ? m.team + " " + spreadStr : m.vs_team + " " + (spread > 0 ? "-" + spread : spreadStr);
                html += `<div class="matchup">
                    <span class="seed seed-${m.seed}">${m.seed}</span>
                    <span class="team-name">${m.team}${m.record ? ' <span style="color:var(--text-dim);font-size:0.8rem">(' + m.record + ')</span>' : ''}</span>
                    ${used1 ? '<span class="team-used">USED</span>' : ''}
                    <span class="vs-label">vs</span>
                    <span class="seed seed-${m.vs_seed}">${m.vs_seed}</span>
                    <span class="team-name">${m.vs_team}</span>
                    ${used2 ? '<span class="team-used">USED</span>' : ''}
                    <span class="${spreadClass}" title="Point spread">${favText}</span>
                </div>`;
            }

            html += `</div></div>`;
        }

        container.innerHTML = html;
    }

    // Render Sorted Lines Tab
    function renderSortedLines() {
        const container = document.getElementById("tab-lines");
        const usedTeams = getUsedTeams();

        // Collect all matchups with region info
        const allMatchups = [];
        for (const [region, matchups] of Object.entries(BRACKET)) {
            for (const m of matchups) {
                allMatchups.push({ ...m, region });
            }
        }

        // Sort by absolute spread descending (biggest lines first)
        allMatchups.sort((a, b) => Math.abs(b.spread) - Math.abs(a.spread));

        let html = `<div class="region-card">
            <div class="region-header" style="cursor:default">
                <h3>All Matchups by Spread</h3>
                <span style="color:var(--text-dim);font-size:0.85rem">${allMatchups.length} games</span>
            </div>
            <div class="region-body">`;

        for (let idx = 0; idx < allMatchups.length; idx++) {
            const m = allMatchups[idx];
            const used1 = usedTeams.has(m.team);
            const used2 = usedTeams.has(m.vs_team);
            const spread = m.spread;
            const spreadStr = spread < 0 ? spread.toString() : "+" + spread;
            const isClose = Math.abs(spread) <= 5;
            const spreadClass = isClose ? "spread-badge spread-close" : "spread-badge";
            const favText = spread <= 0 ? m.team + " " + spreadStr : m.vs_team + " " + (spread > 0 ? "-" + spread : spreadStr);

            html += `<div class="lines-row">
                <span class="lines-rank">${idx + 1}.</span>
                <div class="lines-teams">
                    <span class="seed seed-${m.seed}">${m.seed}</span>
                    <span>${m.team}</span>
                    ${used1 ? '<span class="team-used">USED</span>' : ''}
                    <span class="vs-label">vs</span>
                    <span class="seed seed-${m.vs_seed}">${m.vs_seed}</span>
                    <span>${m.vs_team}</span>
                    ${used2 ? '<span class="team-used">USED</span>' : ''}
                </div>
                <div class="lines-meta">
                    <span class="${spreadClass}" title="Point spread">${favText}</span>
                    <span class="lines-region">${m.region}</span>
                </div>
            </div>`;
        }

        html += `</div></div>`;
        container.innerHTML = html;
    }

    // Render Rules Tab
    function renderRules() {
        document.getElementById("tab-rules").innerHTML = `
        <div class="rules-card">
            <h3>Survivor Pool Rules</h3>
            <ul>
                <li><span class="rule-bold">Buy-in:</span> $50 via Venmo (@bryan-weisgal), tag "2026 MM / Survivor"</li>
                <li><span class="rule-bold">Days 1 & 2 (Thu & Fri):</span> Pick 2 winners each day</li>
                <li><span class="rule-bold">All other days:</span> Pick 1 winner each day</li>
                <li><span class="rule-bold">No repeats:</span> You cannot pick the same team twice</li>
                <li><span class="rule-bold">No rebuys:</span> There are NO rebuys</li>
                <li><span class="rule-bold">Miss a pick = eliminated:</span> If you forget to send in a pick, you are disqualified</li>
                <li><span class="rule-bold">Last person standing wins.</span> No tiebreakers. No rake.</li>
                <li><span class="rule-bold">Chop rule:</span> If more than 1 person goes the whole tourney, it's a chop</li>
                <li><span class="rule-bold">Rebirth rule:</span> If 3 people all lose on Day 1 of Elite 8, they all get another life. But to win and avoid the chop, you need to secure another WIN — not just another selection</li>
                <li><span class="rule-bold">No team to select = loss:</span> If you can't select a team AND everyone else who can select loses (or nobody selects), then everyone survives the following day</li>
                <li><span class="rule-bold">Picks due:</span> Submit picks by the start of each day's games</li>
                <li><span class="rule-bold">Pick submission:</span> Email picks. After a trusted person is eliminated, they become the "picks repository" to prevent information asymmetry</li>
            </ul>
        </div>
        <div class="rules-card" style="margin-top:1rem">
            <h3>Key Tournament Dates</h3>
            <ul>
                <li>First Four: March 17-18 (Dayton, OH)</li>
                <li>Round of 64: March 19-20</li>
                <li>Round of 32: March 21-22</li>
                <li>Sweet 16: March 27-28</li>
                <li>Elite 8: March 29-30</li>
                <li>Final Four: Saturday, April 4 (Indianapolis)</li>
                <li>Championship: Monday, April 6 (Indianapolis)</li>
            </ul>
        </div>`;
    }

    // Interactions
    function setPick(dayId, idx, team) {
        state.picks[dayId][idx].team = team;
        if (!team) state.picks[dayId][idx].result = "";
        saveState();
        renderPicks();
        renderBracket();
        renderSortedLines();
        updateStats();
    }

    function setResult(dayId, idx, result) {
        if (!state.picks[dayId][idx].team) return;
        state.picks[dayId][idx].result = result;
        saveState();
        renderPicks();
        updateStats();
    }

    function resetAll() {
        if (confirm("Reset all picks and results? This cannot be undone.")) {
            state = defaultState();
            saveState();
            renderPicks();
            renderBracket();
            renderSortedLines();
            updateStats();
        }
    }

    function toggleDay(dayId) {
        const body = document.getElementById("body-" + dayId);
        const arrow = document.getElementById("arrow-" + dayId);
        body.classList.toggle("collapsed");
        arrow.classList.toggle("collapsed");
    }

    function toggleRegion(region) {
        const body = document.getElementById("body-region-" + region);
        const arrow = document.getElementById("arrow-region-" + region);
        body.classList.toggle("collapsed");
        arrow.classList.toggle("collapsed");
    }

    // Tab switching
    document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            const target = tab.dataset.tab;
            document.getElementById("tab-picks").style.display = target === "picks" ? "" : "none";
            document.getElementById("tab-bracket").style.display = target === "bracket" ? "" : "none";
            document.getElementById("tab-lines").style.display = target === "lines" ? "" : "none";
            document.getElementById("tab-rules").style.display = target === "rules" ? "" : "none";
        });
    });

    // Init
    renderPicks();
    renderBracket();
    renderSortedLines();
    renderRules();
    updateStats();
    </script>
</body>
</html>
